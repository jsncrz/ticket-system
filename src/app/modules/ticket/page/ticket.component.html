<div class="grid min-h-full">
    <div class="col-12">
        <div class="card px-6 py-6">

            <p-speedDial class="fab-custom" (onClick)="showAddTicketDialog()" className="speeddial-right" [rotateAnimation]="false"></p-speedDial>
            <ts-ticket-board [tickets]="(tickets$ | async)!"></ts-ticket-board>
            <ts-ticket-add [saving]="(saving$ | async)!" [addTicketDialog]="addTicketDialog"
                (closeDialog)="hideAddTicketDialog()" (save)="addTicket($event)"></ts-ticket-add>
        </div>
    </div>
</div>
